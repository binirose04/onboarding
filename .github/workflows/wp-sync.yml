name: Sync HTML to WordPress Page

on:
  push:
    branches:
      - main
    paths:
      - index.html

jobs:
  update-wp-page:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build JSON payload
        run: |
          jq -Rs '{content: .}' index.html > payload.json
          cat payload.json

      - name: Update WordPress Page
        env:
          WP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: |
          curl --fail-with-body -X POST "https://gsdidea.ae/wp-json/wp/v2/pages/1919" \
            -H "Content-Type: application/json" \
            -u "Rose:$WP_PASSWORD" \
            --data @payload.json
